<svg xmlns="http://www.w3.org/2000/svg" width="620" height="250" viewBox="0 0 620 250" font-family="'JetBrains Mono','Fira Code',Consolas,monospace" font-size="13">
  <!-- loop driver: restarts every 9s -->
  <rect width="1" height="1" opacity="0">
    <animate id="loop" attributeName="opacity" begin="0s;loop.end" dur="9s" values="0;0"/>
  </rect>

  <!-- window -->
  <rect x="1" y="1" width="618" height="248" rx="12" fill="#08060f" stroke="#7c3aed" stroke-opacity="0.22" stroke-width="1"/>
  <!-- title bar -->
  <rect x="1" y="1" width="618" height="34" rx="12" fill="#0f0b18"/>
  <rect x="1" y="22" width="618" height="13" fill="#0f0b18"/>
  <circle cx="22" cy="18" r="5.5" fill="#ff5f56"/>
  <circle cx="40" cy="18" r="5.5" fill="#ffbd2e"/>
  <circle cx="58" cy="18" r="5.5" fill="#27c93f"/>
  <text x="80" y="22" fill="#ffffff" fill-opacity="0.25" font-size="11">python — pipeline.py</text>
  <text x="608" y="22" text-anchor="end" fill="#ffffff" fill-opacity="0.12" font-size="11">~/dexion-labs</text>

  <!-- blinking caret -->
  <rect x="18" width="8" height="15" fill="#8b5cf6">
    <animate attributeName="y" begin="loop.begin" dur="9s" fill="freeze" calcMode="discrete"
             values="48;70;92;114;136;158;180"
             keyTimes="0;0.122;0.222;0.322;0.422;0.522;0.622"/>
    <animate attributeName="opacity" begin="0s" dur="1s" repeatCount="indefinite" values="1;1;0;0;1"/>
  </rect>

  <!-- line 0 : command -->
  <text x="18" y="60" fill="#c4a9ec" opacity="0">
    <tspan fill="#8b5cf6">&#10095; </tspan>python pipeline.py --env prod --source all --mode full
    <animate attributeName="opacity" begin="loop.begin" dur="0.01s" to="0" fill="freeze"/>
    <animate attributeName="opacity" begin="loop.begin+0.2s" dur="0.15s" to="1" fill="freeze"/>
  </text>

  <!-- line 1 -->
  <text x="32" y="82" fill="#7aa3e0" opacity="0">[extract] Conectando a 12 fontes de dados...
    <animate attributeName="opacity" begin="loop.begin" dur="0.01s" to="0" fill="freeze"/>
    <animate attributeName="opacity" begin="loop.begin+1.1s" dur="0.15s" to="1" fill="freeze"/>
  </text>

  <!-- line 2 -->
  <text x="32" y="104" fill="#54cf86" opacity="0">[extract] 2.4M registros extra&#237;dos em 38s &#10003;
    <animate attributeName="opacity" begin="loop.begin" dur="0.01s" to="0" fill="freeze"/>
    <animate attributeName="opacity" begin="loop.begin+2.0s" dur="0.15s" to="1" fill="freeze"/>
  </text>

  <!-- line 3 -->
  <text x="32" y="126" fill="#7aa3e0" opacity="0">[transform] Normalizando schema e validando...
    <animate attributeName="opacity" begin="loop.begin" dur="0.01s" to="0" fill="freeze"/>
    <animate attributeName="opacity" begin="loop.begin+2.9s" dur="0.15s" to="1" fill="freeze"/>
  </text>

  <!-- line 4 -->
  <text x="32" y="148" fill="#ffffff" fill-opacity="0.6" opacity="0">[transform] Qualidade: 98.7%  |  Duplicatas: 847 removidas
    <animate attributeName="opacity" begin="loop.begin" dur="0.01s" to="0" fill="freeze"/>
    <animate attributeName="opacity" begin="loop.begin+3.8s" dur="0.15s" to="1" fill="freeze"/>
  </text>

  <!-- line 5 -->
  <text x="32" y="170" fill="#7aa3e0" opacity="0">[load] Enviando &#8594; BigQuery prod.transactions
    <animate attributeName="opacity" begin="loop.begin" dur="0.01s" to="0" fill="freeze"/>
    <animate attributeName="opacity" begin="loop.begin+4.7s" dur="0.15s" to="1" fill="freeze"/>
  </text>

  <!-- line 6 -->
  <text x="32" y="192" fill="#54cf86" opacity="0">[done] Pipeline conclu&#237;do em 4m 23s &#10003;  Custo: $0.12
    <animate attributeName="opacity" begin="loop.begin" dur="0.01s" to="0" fill="freeze"/>
    <animate attributeName="opacity" begin="loop.begin+5.6s" dur="0.15s" to="1" fill="freeze"/>
  </text>
</svg>
