<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" font-family="'JetBrains Mono','Fira Code',Consolas,monospace">
  <!-- loop driver: terminal restarts every 9s -->
  <rect width="1" height="1" opacity="0">
    <animate id="loop" attributeName="opacity" begin="0s;loop.end" dur="9s" values="0;0"/>
  </rect>

  <!-- ===================== LEFT: STAT CARDS (2x2) ===================== -->
  <!-- Card A : 2.4M -->
  <g opacity="0">
    <animate attributeName="opacity" begin="0s" dur="0.6s" to="1" fill="freeze"/>
    <rect x="40" y="40" width="254" height="200" rx="24" fill="#110f15" stroke="#2a2731"/>
    <text x="167" y="128" text-anchor="middle" font-size="54" font-weight="900" fill="#8852e0">2.4M</text>
    <text x="167" y="172" text-anchor="middle" font-size="20" fill="#8b8794">registros/dia</text>
  </g>
  <!-- Card B : 98.7% -->
  <g opacity="0">
    <animate attributeName="opacity" begin="0.12s" dur="0.6s" to="1" fill="freeze"/>
    <rect x="326" y="40" width="254" height="200" rx="24" fill="#110f15" stroke="#2a2731"/>
    <text x="453" y="128" text-anchor="middle" font-size="54" font-weight="900" fill="#e83030">98.7%</text>
    <text x="453" y="172" text-anchor="middle" font-size="20" fill="#8b8794">qualidade</text>
  </g>
  <!-- Card C : +50 -->
  <g opacity="0">
    <animate attributeName="opacity" begin="0.24s" dur="0.6s" to="1" fill="freeze"/>
    <rect x="40" y="272" width="254" height="200" rx="24" fill="#110f15" stroke="#2a2731"/>
    <text x="167" y="360" text-anchor="middle" font-size="54" font-weight="900" fill="#497bdf">+50</text>
    <text x="167" y="404" text-anchor="middle" font-size="20" fill="#8b8794">conectores</text>
  </g>
  <!-- Card D : 4m -->
  <g opacity="0">
    <animate attributeName="opacity" begin="0.36s" dur="0.6s" to="1" fill="freeze"/>
    <rect x="326" y="272" width="254" height="200" rx="24" fill="#110f15" stroke="#2a2731"/>
    <text x="453" y="360" text-anchor="middle" font-size="54" font-weight="900" fill="#4dcb7b">4m</text>
    <text x="453" y="404" text-anchor="middle" font-size="20" fill="#8b8794">pipeline completo</text>
  </g>

  <!-- ===================== RIGHT: LABEL + TERMINAL ===================== -->
  <!-- label row -->
  <circle cx="632" cy="48" r="7" fill="#4dcb7b">
    <animate attributeName="opacity" begin="0s" dur="1.6s" repeatCount="indefinite" values="1;0.3;1"/>
    <animate attributeName="r" begin="0s" dur="1.6s" repeatCount="indefinite" values="7;8.5;7"/>
  </circle>
  <text x="652" y="55" font-size="20" fill="#e46767">pipeline de dados em execução</text>

  <!-- terminal -->
  <g transform="translate(620,80)">
    <rect x="0.5" y="0.5" width="539" height="249" rx="12" fill="#08060b" stroke="#7a3cdd" stroke-opacity="0.2"/>
    <!-- title bar -->
    <rect x="0.5" y="0.5" width="539" height="34" rx="12" fill="#0f0c15"/>
    <rect x="0.5" y="22" width="539" height="13" fill="#0f0c15"/>
    <circle cx="20" cy="18" r="5.5" fill="#ff5f56"/>
    <circle cx="38" cy="18" r="5.5" fill="#ffbd2e"/>
    <circle cx="56" cy="18" r="5.5" fill="#27c93f"/>
    <text x="78" y="22" fill="#ffffff" fill-opacity="0.2" font-size="11" letter-spacing="0.04em">python — pipeline.py</text>
    <text x="528" y="22" text-anchor="end" fill="#ffffff" fill-opacity="0.1" font-size="11">~/dexion-labs</text>

    <!-- blinking caret -->
    <rect x="18" width="8" height="15" fill="#8b5cf6" font-size="13">
      <animate attributeName="y" begin="loop.begin" dur="9s" fill="freeze" calcMode="discrete"
               values="48;70;92;114;136;158;180"
               keyTimes="0;0.122;0.222;0.322;0.422;0.522;0.622"/>
      <animate attributeName="opacity" begin="0s" dur="1s" repeatCount="indefinite" values="1;1;0;0;1"/>
    </rect>

    <!-- log lines -->
    <text x="18" y="60" font-size="13" fill="#c5adeb" opacity="0">
      <tspan fill="#6022c3">&#10095; </tspan>python pipeline.py --env prod --source all --mode full
      <animate attributeName="opacity" begin="loop.begin" dur="0.01s" to="0" fill="freeze"/>
      <animate attributeName="opacity" begin="loop.begin+0.2s" dur="0.15s" to="1" fill="freeze"/>
    </text>
    <text x="32" y="82" font-size="13" fill="#81a2e4" opacity="0">[extract] Conectando a 12 fontes de dados...
      <animate attributeName="opacity" begin="loop.begin" dur="0.01s" to="0" fill="freeze"/>
      <animate attributeName="opacity" begin="loop.begin+1.1s" dur="0.15s" to="1" fill="freeze"/>
    </text>
    <text x="32" y="104" font-size="13" fill="#59cf84" opacity="0">[extract] 2.4M registros extra&#237;dos em 38s &#10003;
      <animate attributeName="opacity" begin="loop.begin" dur="0.01s" to="0" fill="freeze"/>
      <animate attributeName="opacity" begin="loop.begin+2.0s" dur="0.15s" to="1" fill="freeze"/>
    </text>
    <text x="32" y="126" font-size="13" fill="#81a2e4" opacity="0">[transform] Normalizando schema e validando...
      <animate attributeName="opacity" begin="loop.begin" dur="0.01s" to="0" fill="freeze"/>
      <animate attributeName="opacity" begin="loop.begin+2.9s" dur="0.15s" to="1" fill="freeze"/>
    </text>
    <text x="32" y="148" font-size="13" fill="#ffffff" fill-opacity="0.6" opacity="0">[transform] Qualidade: 98.7%  |  Duplicatas: 847 removidas
      <animate attributeName="opacity" begin="loop.begin" dur="0.01s" to="0" fill="freeze"/>
      <animate attributeName="opacity" begin="loop.begin+3.8s" dur="0.15s" to="1" fill="freeze"/>
    </text>
    <text x="32" y="170" font-size="13" fill="#81a2e4" opacity="0">[load] Enviando &#8594; BigQuery prod.transactions
      <animate attributeName="opacity" begin="loop.begin" dur="0.01s" to="0" fill="freeze"/>
      <animate attributeName="opacity" begin="loop.begin+4.7s" dur="0.15s" to="1" fill="freeze"/>
    </text>
    <text x="32" y="192" font-size="13" fill="#59cf84" opacity="0">[done] Pipeline conclu&#237;do em 4m 23s &#10003;  Custo: $0.12
      <animate attributeName="opacity" begin="loop.begin" dur="0.01s" to="0" fill="freeze"/>
      <animate attributeName="opacity" begin="loop.begin+5.6s" dur="0.15s" to="1" fill="freeze"/>
    </text>
  </g>
</svg>
